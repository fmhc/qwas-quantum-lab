version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_FRONTEND_80
    networks:
      - qwas-network

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data
    environment:
      - SERVICE_FQDN_POCKETBASE_8090=/pb
    networks:
      - qwas-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  qwas-network:
    driver: bridge

volumes:
  pb_data:
