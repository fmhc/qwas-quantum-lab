version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - qwas-network
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.qwas.entrypoints=https
      - traefik.http.routers.qwas.rule=Host(`qwas.callthe.dev`)
      - traefik.http.routers.qwas.tls=true
      - traefik.http.routers.qwas.tls.certresolver=letsencrypt
      - traefik.http.services.qwas.loadbalancer.server.port=80

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data
    networks:
      - qwas-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  qwas-network:
    driver: bridge
  coolify:
    external: true

volumes:
  pb_data:
