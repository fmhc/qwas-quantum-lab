version: '3.8'

services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - qwas-network

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data
      - ./pocketbase/pb_migrations:/pb/pb_migrations
    environment:
      - POCKETBASE_ADMIN_EMAIL=admin@qwas.callthe.dev
      - POCKETBASE_ADMIN_PASSWORD=qwas-quantum-2024
    networks:
      - qwas-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - pocketbase
    networks:
      - qwas-network

networks:
  qwas-network:
    driver: bridge

volumes:
  pb_data:
